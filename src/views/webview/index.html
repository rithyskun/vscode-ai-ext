<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; img-src https:;">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
<style>
  :root {
    --bg: #0a0a0f;
    --bg-secondary: #12121a;
    --fg: #e8e8e8;
    --muted: #8b8b9b;
    --input-bg: #1a1a24;
    --input-fg: #e8e8e8;
    --input-border: #2a2a3a;
    --border: #1e1e2e;
    --border-hover: #3a3a4a;
    --accent: #8b5cf6;
    --accent-hover: #7c3aed;
    --accent-fg: #ffffff;
    --accent-subtle: rgba(139, 92, 246, 0.15);
    --user-msg-bg: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
    --user-msg-fg: #ffffff;
    --asst-msg-bg: transparent;
    --asst-msg-border: transparent;
    --tool-bg: rgba(139, 92, 246, 0.08);
    --code-bg: #1a1a24;
    --code-border: #2a2a3a;
    --font-mono: 'SF Mono', Monaco, 'Cascadia Code', 'Consolas', monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --radius: 16px;
    --radius-sm: 8px;
    --shadow: 0 4px 20px rgba(0,0,0,0.4);
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: var(--font-sans);
    font-size: 15px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  #header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--bg-secondary);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-icon {
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: white;
    font-weight: 700;
    box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
  }

  #header h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--fg);
    letter-spacing: -0.5px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .provider-select {
    background: var(--input-bg);
    color: var(--fg);
    border: 1px solid var(--input-border);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    transition: all 0.2s ease;
  }

  .provider-select:hover {
    border-color: var(--accent);
    background: var(--accent-subtle);
  }

  .provider-select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
  }

  .provider-select option {
    background: var(--bg-secondary);
    color: var(--fg);
  }

  .model-select {
    background: var(--input-bg);
    color: var(--fg);
    border: 1px solid var(--input-border);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    outline: none;
    transition: all 0.2s ease;
    min-width: 180px;
  }

  .model-select:hover {
    border-color: var(--accent);
    background: var(--accent-subtle);
  }

  .model-select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
  }

  .model-select option {
    background: var(--bg-secondary);
    color: var(--fg);
  }

  #mode-badge {
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 20px;
    background: var(--accent-subtle);
    color: var(--accent);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border: 1px solid rgba(139, 92, 246, 0.3);
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .message {
    display: flex;
    gap: 16px;
    max-width: 100%;
    animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
    box-shadow: var(--shadow-sm);
  }

  .avatar.user {
    background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
    color: white;
  }

  .avatar.assistant {
    background: linear-gradient(135deg, #ec4899 0%, #f43f5e 100%);
    color: white;
  }

  .avatar.tool {
    background: var(--tool-bg);
    color: var(--accent);
    border: 1px solid rgba(139, 92, 246, 0.3);
  }

  .message-content {
    flex: 1;
    min-width: 0;
  }

  .message.user .message-content {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }

  .message-bubble {
    padding: 16px 18px;
    border-radius: var(--radius);
    max-width: 100%;
    word-break: break-word;
    line-height: 1.8;
  }

  .message.user .message-bubble {
    background: var(--user-msg-bg);
    color: var(--user-msg-fg);
    border-radius: 24px 24px 8px 24px;
    box-shadow: var(--shadow);
    max-width: 85%;
  }

  .message.assistant .message-bubble {
    background: var(--asst-msg-bg);
    border: none;
    border-radius: 0;
    padding: 0;
  }

  .message.tool .message-bubble {
    background: var(--tool-bg);
    font-family: var(--font-mono);
    font-size: 13px;
    border: 1px solid rgba(139, 92, 246, 0.2);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
  }

  .message.error .message-bubble {
    border: 1px solid rgba(239, 68, 68, 0.3);
    background: rgba(239, 68, 68, 0.1);
    border-radius: var(--radius-sm);
    color: #fca5a5;
  }

  .tool-header {
    font-size: 11px;
    opacity: 0.8;
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
    color: var(--accent);
  }

  pre {
    background: var(--code-bg);
    border-radius: var(--radius-sm);
    padding: 16px;
    overflow-x: auto;
    font-family: var(--font-mono);
    font-size: 13px;
    margin: 12px 0;
    white-space: pre-wrap;
    border: 1px solid var(--code-border);
    position: relative;
    line-height: 1.6;
  }

  code {
    font-family: var(--font-mono);
    font-size: 13px;
    background: var(--code-bg);
    padding: 3px 8px;
    border-radius: 6px;
    border: 1px solid var(--code-border);
  }

  p {
    line-height: 1.8;
    margin: 10px 0;
  }

  .typing {
    display: inline-flex;
    gap: 6px;
    align-items: center;
    padding: 12px 0;
  }

  .typing span {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    opacity: 0.6;
    animation: blink 1.5s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.3; transform: scale(1); }
    40% { opacity: 1; transform: scale(1.3); }
  }

  #input-container {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    background: var(--bg-secondary);
  }

  #agent-toggle {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    font-size: 13px;
    color: var(--muted);
  }

  #agent-toggle label {
    cursor: pointer;
    user-select: none;
    font-weight: 500;
  }

  input[type=checkbox] {
    accent-color: var(--accent);
    width: 18px;
    height: 18px;
    cursor: pointer;
  }

  #input-row {
    display: flex;
    gap: 12px;
    align-items: flex-end;
  }

  #prompt {
    flex: 1;
    background: var(--input-bg);
    color: var(--input-fg);
    border: 1px solid var(--input-border);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 15px;
    font-family: inherit;
    resize: none;
    min-height: 48px;
    max-height: 180px;
    outline: none;
    line-height: 1.6;
    transition: all 0.2s ease;
  }

  #prompt:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
  }

  #prompt::placeholder {
    color: var(--muted);
  }

  #send-btn {
    background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
    color: var(--accent-fg);
    border: none;
    border-radius: var(--radius);
    padding: 14px 20px;
    cursor: pointer;
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
    transition: all 0.2s ease;
    box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
  }

  #send-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(139, 92, 246, 0.5);
  }

  #send-btn:active:not(:disabled) {
    transform: translateY(0);
  }

  #send-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  #send-btn svg {
    width: 20px;
    height: 20px;
  }

  ::-webkit-scrollbar {
    width: 8px;
  }

  ::-webkit-scrollbar-track {
    background: transparent;
  }

  ::-webkit-scrollbar-thumb {
    background: rgba(139, 92, 246, 0.3);
    border-radius: 4px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: rgba(139, 92, 246, 0.5);
  }

  .message-actions {
    display: none;
    flex-direction: row;
    gap: 8px;
    margin-top: 8px;
    opacity: 0;
    animation: fadeIn 0.2s ease;
  }

  .message:hover .message-actions {
    display: flex;
  }

  .action-btn {
    background: rgba(139, 92, 246, 0.15);
    border: 1px solid rgba(139, 92, 246, 0.3);
    color: var(--accent);
    padding: 6px 12px;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-weight: 500;
    white-space: nowrap;
  }

  .action-btn:hover {
    background: rgba(139, 92, 246, 0.25);
    border-color: var(--accent);
    box-shadow: 0 0 12px rgba(139, 92, 246, 0.2);
  }

  .action-btn:active {
    transform: scale(0.95);
  }

  .action-btn.copied {
    background: rgba(34, 197, 94, 0.15);
    border-color: rgba(34, 197, 94, 0.5);
    color: #86efac;
  }

  .code-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px;
    background: rgba(139, 92, 246, 0.1);
    border-bottom: 1px solid rgba(139, 92, 246, 0.2);
    font-size: 12px;
    color: var(--muted);
    border-radius: var(--radius-sm) var(--radius-sm) 0 0;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .code-copy-btn {
    background: rgba(139, 92, 246, 0.2);
    border: none;
    color: var(--accent);
    padding: 4px 8px;
    border-radius: 4px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-weight: 500;
  }

  .code-copy-btn:hover {
    background: rgba(139, 92, 246, 0.35);
  }

  .code-copy-btn.copied {
    background: rgba(34, 197, 94, 0.3);
    color: #86efac;
  }

  pre {
    margin: 0;
    border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  }

  pre code {
    border: none;
    padding: 0;
    background: transparent;
  }

  .hljs {
    background: var(--code-bg) !important;
    padding: 0 !important;
  }
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/typescript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/bash.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/yaml.min.js"></script>
<div id="header">
  <div class="header-left">
    <div class="header-icon">AI</div>
    <h1>AI Assistant</h1>
  </div>
  <div class="header-right">
    <select id="provider-select" class="provider-select">
      <option value="anthropic">Anthropic</option>
      <option value="ollama">Ollama</option>
      <option value="openrouter">OpenRouter</option>
    </select>
    <select id="model-select" class="model-select">
      <option value="">Default Model</option>
    </select>
    <span id="mode-badge">chat</span>
  </div>
</div>
<div id="messages"></div>
<div id="input-container">
  <div id="agent-toggle">
    <input type="checkbox" id="agent-cb">
    <label for="agent-cb">Agent mode</label>
  </div>
  <div id="input-row">
    <textarea id="prompt" rows="1" placeholder="Ask anything about your code…"></textarea>
    <button id="send-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
const vscode = acquireVsCodeApi();
const state  = vscode.getState() || { history: [], agentMode: false, selectedProvider: 'ollama', selectedModel: '' };

const messagesEl    = document.getElementById('messages');
const promptEl      = document.getElementById('prompt');
const sendBtn       = document.getElementById('send-btn');
const agentCb       = document.getElementById('agent-cb');
const modeBadge     = document.getElementById('mode-badge');
const providerSelect = document.getElementById('provider-select');
const modelSelect   = document.getElementById('model-select');

agentCb.checked = state.agentMode;
providerSelect.value = state.selectedProvider;
modelSelect.value = state.selectedModel;
updateBadge();
updateModelOptions();

agentCb.addEventListener('change', () => {
  state.agentMode = agentCb.checked;
  vscode.setState(state);
  updateBadge();
});

providerSelect.addEventListener('change', () => {
  state.selectedProvider = providerSelect.value;
  state.selectedModel = '';
  modelSelect.value = '';
  vscode.setState(state);
  vscode.postMessage({ type: 'changeProvider', provider: providerSelect.value });
  updateModelOptions();
});

modelSelect.addEventListener('change', () => {
  state.selectedModel = modelSelect.value;
  vscode.setState(state);
  vscode.postMessage({ type: 'changeModel', model: modelSelect.value });
});

function updateBadge() {
  modeBadge.textContent = state.agentMode ? 'agent' : 'chat';
}

function updateModelOptions() {
  const provider = providerSelect.value;
  modelSelect.innerHTML = '<option value="">Default Model</option>';

  if (provider === 'openrouter') {
    const freeModels = [
      'google/gemma-2-9b-it:free',
      'meta-llama/llama-3.2-3b-instruct:free',
      'meta-llama/llama-3.2-1b-instruct:free',
      'qwen/qwen-2.5-7b-instruct:free',
      'mistralai/mistral-7b-instruct:free',
      'microsoft/phi-3-mini-128k-instruct:free',
      'cognitivecomputations/dolphin-mixtral-8x7b:free'
    ];
    freeModels.forEach(model => {
      const option = document.createElement('option');
      option.value = model;
      option.textContent = model.replace(':free', '');
      modelSelect.appendChild(option);
    });
  } else if (provider === 'ollama') {
    const ollamaModels = [
      'qwen2.5-coder:7b',
      'qwen2.5-coder:1.5b',
      'llama3.2',
      'mistral'
    ];
    ollamaModels.forEach(model => {
      const option = document.createElement('option');
      option.value = model;
      option.textContent = model;
      modelSelect.appendChild(option);
    });
  } else if (provider === 'anthropic') {
    const anthropicModels = [
      'claude-haiku-4-5-20251001',
      'claude-3-5-sonnet-20241022'
    ];
    anthropicModels.forEach(model => {
      const option = document.createElement('option');
      option.value = model;
      option.textContent = model;
      modelSelect.appendChild(option);
    });
  }
}

// Auto-resize textarea
promptEl.addEventListener('input', () => {
  promptEl.style.height = 'auto';
  promptEl.style.height = Math.min(promptEl.scrollHeight, 160) + 'px';
});

promptEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', sendMessage);

function sendMessage() {
  const text = promptEl.value.trim();
  if (!text) return;
  promptEl.value = '';
  promptEl.style.height = 'auto';
  appendMessage('user', escapeHtml(text));
  setLoading(true);
  vscode.postMessage({ type: 'chat', text, agentMode: state.agentMode, history: state.history });
}

let currentAssistantEl = null;

function appendMessage(role, html, cssClass = '', originalText = '') {
  const messageDiv = document.createElement('div');
  messageDiv.className = `message ${role} ${cssClass}`.trim();

  const avatarDiv = document.createElement('div');
  avatarDiv.className = `avatar ${role}`;
  avatarDiv.textContent = role === 'user' ? 'U' : role === 'assistant' ? 'AI' : '🔧';

  const contentDiv = document.createElement('div');
  contentDiv.className = 'message-content';

  const bubbleDiv = document.createElement('div');
  bubbleDiv.className = 'message-bubble';
  bubbleDiv.innerHTML = html;

  contentDiv.appendChild(bubbleDiv);

  // Add action buttons for assistant messages
  if (role === 'assistant' && !cssClass.includes('tool')) {
    const actionsDiv = document.createElement('div');
    actionsDiv.className = 'message-actions';
    
    const copyBtn = document.createElement('button');
    copyBtn.className = 'action-btn';
    copyBtn.textContent = 'Copy';
    copyBtn.onclick = () => copyMessage(copyBtn);
    
    const retryBtn = document.createElement('button');
    retryBtn.className = 'action-btn';
    retryBtn.textContent = 'Retry';
    retryBtn.onclick = () => retryMessage(retryBtn, originalText, state.agentMode);
    
    const regenBtn = document.createElement('button');
    regenBtn.className = 'action-btn';
    regenBtn.textContent = 'Regenerate';
    regenBtn.onclick = () => regenerateMessage(regenBtn, state.agentMode);
    
    actionsDiv.appendChild(copyBtn);
    actionsDiv.appendChild(retryBtn);
    actionsDiv.appendChild(regenBtn);
    contentDiv.appendChild(actionsDiv);
  }

  messageDiv.appendChild(avatarDiv);
  messageDiv.appendChild(contentDiv);

  messagesEl.appendChild(messageDiv);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return bubbleDiv;
}

function setLoading(on) {
  sendBtn.disabled = on;
  if (on) {
    currentAssistantEl = appendMessage('assistant', '<div class="typing"><span></span><span></span><span></span></div>');
  }
}

function renderMarkdown(text) {
  // Code blocks with syntax highlighting
  let result = text
    .replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
      const trimmedCode = code.trim();
      let highlighted = trimmedCode;
      if (lang && hljs.getLanguage(lang)) {
        highlighted = hljs.highlight(trimmedCode, { language: lang }).value;
      } else {
        highlighted = hljs.highlightAuto(trimmedCode).value;
      }
      const displayLang = lang || 'code';
      return `<div class="code-header"><span>${escapeHtml(displayLang)}</span><button class="code-copy-btn" onclick="copyCode(this)">Copy</button></div><pre><code class="hljs language-${lang}">${highlighted}</code></pre>`;
    })
    .replace(/`([^`]+)`/g, (_, c) => `<code>${escapeHtml(c)}</code>`)
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\n\n+/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^(.+)$/, '<p>$1</p>');

  return result;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function copyCode(btn) {
  const pre = btn.closest('.code-header').nextElementSibling;
  const code = pre.querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = orig;
      btn.classList.remove('copied');
    }, 2000);
  });
}

function copyMessage(btn) {
  const bubble = btn.closest('.message-bubble');
  const text = bubble.textContent;
  navigator.clipboard.writeText(text).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = orig;
      btn.classList.remove('copied');
    }, 2000);
  });
}

function retryMessage(btn, text, agentMode) {
  setLoading(true);
  vscode.postMessage({ type: 'chat', text, agentMode, history: state.history });
}

function regenerateMessage(btn, agentMode) {
  if (state.history.length === 0) return;
  const lastUserMsg = [...state.history].reverse().find(m => m.role === 'user');
  if (!lastUserMsg) return;
  setLoading(true);
  vscode.postMessage({ type: 'chat', text: lastUserMsg.content, agentMode, history: state.history.slice(0, -2) });
}

window.addEventListener('message', event => {
  const msg = event.data;

  switch (msg.type) {
    case 'stream_chunk':
      if (currentAssistantEl) {
        currentAssistantEl.innerHTML = renderMarkdown(msg.accumulated);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
      break;

    case 'stream_done':
      setLoading(false);
      state.history = msg.history;
      state.lastStreamText = msg.history[msg.history.length - 1]?.content || '';
      vscode.setState(state);
      currentAssistantEl = null;
      break;

    case 'agent_update':
      handleAgentUpdate(msg.update);
      break;

    case 'providerChanged':
      appendMessage('assistant', `Provider changed to <strong>${escapeHtml(msg.provider)}</strong>`);
      break;

    case 'modelChanged':
      if (msg.model === 'default') {
        appendMessage('assistant', `Model reset to default`);
      } else {
        appendMessage('assistant', `Model changed to <strong>${escapeHtml(msg.model)}</strong>`);
      }
      break;

    case 'error':
      if (currentAssistantEl) {
        currentAssistantEl.closest('.message').remove();
      }
      currentAssistantEl = null;
      setLoading(false);
      appendMessage('assistant', `<span style="color:var(--vscode-errorForeground)">⚠ ${escapeHtml(msg.message)}</span>`, 'error');
      break;
  }
});

function handleAgentUpdate(update) {
  switch (update.type) {
    case 'text':
      if (currentAssistantEl) {
        currentAssistantEl.innerHTML = renderMarkdown(update.content);
      } else {
        currentAssistantEl = appendMessage('assistant', renderMarkdown(update.content));
      }
      break;
    case 'tool_call':
      currentAssistantEl = null;
      appendMessage('assistant',
        `<div class="tool-header">🔧 Tool call</div><strong>${escapeHtml(update.name)}</strong><pre>${escapeHtml(JSON.stringify(update.args, null, 2))}</pre>`,
        'tool');
      break;
    case 'tool_result':
      appendMessage('assistant',
        `<div class="tool-header">✅ Result: ${escapeHtml(update.name)}</div><pre>${escapeHtml(update.result)}</pre>`,
        'tool');
      break;
    case 'done':
      setLoading(false);
      currentAssistantEl = null;
      break;
    case 'error':
      setLoading(false);
      appendMessage('assistant', `<span style="color:var(--vscode-errorForeground)">⚠ ${escapeHtml(update.message)}</span>`, 'error');
      break;
  }
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
</script>
