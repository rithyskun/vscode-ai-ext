name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Lint
      run: npm run lint

    - name: Compile
      run: npm run compile

    - name: Copy config
      run: npm run copy-config

    - name: Verify output
      run: |
        test -f out/extension.js || exit 1
        test -f out/providers.json || exit 1

  checks:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check build
      run: npm run build

    - name: Check TypeScript
      run: npm run typecheck

    - name: Run tests
      run: npm test

  publish-extension:
    needs: [ build, checks ]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build extension
      run: |
        npm run compile
        npm run copy-config

    - name: Package VSIX
      run: npx vsce package

    - name: Upload VSIX artifact
      uses: actions/upload-artifact@v3
      with:
        name: vscode-extension
        path: "*.vsix"
        retention-days: 30
    # Uncomment below to publish to Open VSX or VS Marketplace
    # - name: Publish to Open VSX
    #   if: ${{ secrets.OPEN_VSX_TOKEN != '' }}
    #   run: |
    #     npx ovsx publish vscode-ai-assistant-*.vsix \
    #       -p ${{ secrets.OPEN_VSX_TOKEN }}

